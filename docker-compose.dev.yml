# Standalone development environment — only infrastructure services.
# Run Vylux locally via `go run ./cmd/vylux`.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#
# Then use .env.local with localhost addresses:
#   DATABASE_URL=postgres://myuser:mypassword@localhost:5434/mydb
#   REDIS_URL=redis://localhost:6381
#   SOURCE_S3_ENDPOINT=http://localhost:9002
#   MEDIA_S3_ENDPOINT=http://localhost:9002
#   SOURCE_S3_ACCESS_KEY=...
#   SOURCE_S3_SECRET_KEY=...
#   MEDIA_S3_ACCESS_KEY=...
#   MEDIA_S3_SECRET_KEY=...

name: vylux-dev

services:
  postgres:
    image: postgres:18.1-alpine
    ports:
      - 5434:5432
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mypassword}
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
      TZ: UTC
      POSTGRES_INITDB_ARGS: >-
        --locale-provider=builtin
        --builtin-locale=C.UTF-8
        --encoding=UTF8
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-mydb}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8.4-alpine
    ports:
      - 6381:6379
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    ports:
      - 9002:9000
      - 9003:9001
    environment:
      RUSTFS_ACCESS_KEY: ${SOURCE_S3_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${SOURCE_S3_SECRET_KEY}
    volumes:
      - rustfs_data_dev:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  postgres-data:
  redis-data:
  rustfs_data_dev:
